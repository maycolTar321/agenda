<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Life Optimizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0080">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main>
        <!-- PAGE 1: HOME -->
        <div id="page-home" class="tab-content">
            <div class="header-top">
                <div class="month-selector">
                    <span id="display-month">Jun</span>
                    <i class="fas fa-chevron-down" style="font-size: 0.8rem;"></i>
                </div>
                <div class="header-icons">
                    <i class="fas fa-search"></i>
                    <i class="fas fa-bell"></i>
                    <div class="avatar" style="width: 32px; height: 32px;"></div>
                </div>
            </div>

            <div class="calendar-strip" id="calendar-strip">
                <!-- Days will be injected -->
            </div>

            <div class="tips-bar">
                <p>Aquí están tus consejos basados en IA para optimizar tu tiempo, Maycol!</p>
                <i class="fas fa-chevron-right"></i>
            </div>

            <div class="tab-switcher">
                <button class="tab-btn active" onclick="zCore.toggleHomeFilter('all', this)">Todos</button>
                <button class="tab-btn" onclick="zCore.toggleHomeFilter('new', this)">Nuevos (3)</button>
            </div>

            <h3>Hoy</h3>
            <div class="task-list" id="home-task-list">
                <!-- Example Card -->
                <div class="card card-white">
                    <div class="task-card-header">
                        <span class="task-time">12:00 - 13:30</span>
                        <div class="avatars">
                            <div class="avatar"></div>
                            <div class="avatar" style="margin-left: -8px;"></div>
                        </div>
                    </div>
                    <h2 class="task-title">Product Design Demo</h2>
                    <p style="color: #888; font-size: 0.9rem;">35+ participantes</p>
                </div>
            </div>
        </div>

        <!-- PAGE 2: ADD TASK -->
        <div id="page-add" class="tab-content hidden">
            <div class="form-page">
                <h2>Programar Tarea</h2>
                <div class="input-group">
                    <label>Nombre de la Tarea</label>
                    <input type="text" id="task-name" class="input-field" placeholder="Ej. Diseño de Producto">
                </div>
                <div class="input-group">
                    <label>Fecha y Hora</label>
                    <input type="datetime-local" id="task-datetime" class="input-field">
                </div>
                <div class="input-group">
                    <label>Categoría</label>
                    <select id="task-category" class="input-field">
                        <option value="work">Trabajo (Rosa)</option>
                        <option value="personal">Personal (Morado)</option>
                        <option value="other">Otro (Cian)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Notas</label>
                    <textarea id="task-note" class="input-field" style="height: 100px;" placeholder="Detalles adicionales..."></textarea>
                </div>
                <button class="btn-action" onclick="zCore.addTask()">Guardar Tarea</button>
            </div>
        </div>

        <!-- PAGE 3: NOTES -->
        <div id="page-notes" class="tab-content hidden">
            <div class="form-page">
                <h2>Mis Notas</h2>
                <textarea id="notes-area" class="input-field" style="height: 500px; border: none; background: #fff;" placeholder="Empieza a escribir..."></textarea>
            </div>
        </div>

        <!-- PAGE 4: ITEMS -->
        <div id="page-items" class="tab-content hidden">
            <div class="form-page">
                <h2>Suministros</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="item-input" class="input-field" style="margin: 0;" placeholder="Nuevo item...">
                    <button onclick="zCore.addItem()" class="btn-action" style="width: 70px; padding: 0;">+</button>
                </div>
                <div id="items-list" class="task-list"></div>
            </div>
        </div>

        <!-- PAGE 5: BACKUP -->
        <div id="page-backup" class="tab-content hidden">
            <div class="form-page" style="text-align: center;">
                <h2>Base de Datos</h2>
                <div class="card card-black" style="margin-top: 20px;">
                    <p style="margin-bottom: 20px;">Mantén tus datos seguros exportando una copia de seguridad local.</p>
                    <button class="btn-action" style="background: var(--secondary-gradient);" onclick="zCore.exportDB()">
                        <i class="fas fa-download"></i> Exportar JSON
                    </button>
                    <div style="margin-top: 20px;">
                        <input type="file" id="import-file" style="display: none;" onchange="zCore.importDB(event)">
                        <button class="btn-action" style="background: #333;" onclick="document.getElementById('import-file').click()">
                            <i class="fas fa-upload"></i> Importar JSON
                        </button>
                    </div>
                </div>
                <button class="btn-action" style="background: #ff3b30; margin-top: 50px;" onclick="zCore.wipeDB()">
                    RESET TOTAL
                </button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="zCore.switchTab('home', this)">
            <i class="fas fa-home"></i>
        </button>
        <button class="nav-item" onclick="zCore.switchTab('add', this)">
            <i class="fas fa-calendar-plus"></i>
        </button>
        <button class="nav-item" onclick="zCore.switchTab('notes', this)">
            <i class="fas fa-pen-nib"></i>
        </button>
        <button class="nav-item" onclick="zCore.switchTab('items', this)">
            <i class="fas fa-shopping-bag"></i>
        </button>
        <button class="nav-item" onclick="zCore.switchTab('backup', this)">
            <i class="fas fa-database"></i>
        </button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
