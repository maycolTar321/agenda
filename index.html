<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Core: Life Optimizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <link rel="icon" type="image/png" href="android-assets/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-standard">
    <div id="ki-container"></div>
    
    <header class="glass">
        <div class="user-profile">
            <img src="android-assets/icon-192.png" alt="Z-Core" class="profile-pic">
            <div class="greeting">
                <span class="capsule-corp">CAPSULE CORP</span>
                <h1 id="user-greeting">HOLA, GUERRERO Z</h1>
            </div>
        </div>
        <div class="power-level-container">
            <div class="scouter-display">
                <i class="fas fa-bolt"></i> <span class="label">Poder:</span>
                <span id="power-value">9000</span>
            </div>
            <div class="power-bar-wrapper">
                <div id="power-bar" class="power-bar"></div>
            </div>
        </div>
    </header>

    <main>
        <section id="horizontal-calendar" class="glass">
            <div class="month-label" id="current-month">MAYO 2026</div>
            <div class="days-strip" id="days-strip">
                <!-- Days will be generated by JS -->
            </div>
        </section>

        <section id="dashboard" class="grid-container">
            <!-- Daily Missions (Checklist) -->
            <div class="card glass missions-z">
                <div class="card-header">
                    <h2><i class="fas fa-bullseye"></i> MISIONES DIARIAS</h2>
                    <span class="count-badge" id="mission-count">0</span>
                </div>
                <div class="input-group">
                    <input type="text" id="mission-input" placeholder="Nueva misión...">
                    <select id="mission-priority">
                        <option value="S">RANGO S</option>
                        <option value="A">RANGO A</option>
                        <option value="B">RANGO B</option>
                    </select>
                    <button id="add-mission" class="btn-glow">ASIGNAR</button>
                </div>
                <ul id="missions-list" class="task-list"></ul>
            </div>

            <!-- Supply List (Market) -->
            <div class="card glass supplies-z">
                <div class="card-header">
                    <h2><i class="fas fa-shopping-cart"></i> SUMINISTROS</h2>
                    <span class="count-badge" id="supply-count">0</span>
                </div>
                <div class="input-group">
                    <input type="text" id="supply-input" placeholder="Agregar insumo...">
                    <button id="add-supply" class="btn-glow"><i class="fas fa-plus"></i></button>
                </div>
                <ul id="supplies-list" class="task-list"></ul>
            </div>

            <!-- Gravity Training -->
            <div class="card glass gravity-room">
                <div class="card-header">
                    <h2><i class="fas fa-dumbbell"></i> CÁMARA DE GRAVEDAD</h2>
                </div>
                <div class="timer-display" id="timer">25:00</div>
                <div class="gravity-controls">
                    <button id="start-timer" class="btn-glow"><i class="fas fa-play"></i> ENTRENAR</button>
                    <button id="reset-timer"><i class="fas fa-undo"></i></button>
                </div>
                <div class="gravity-status">GRAVEDAD: <span id="gravity-mult">1x</span></div>
            </div>
        </section>
    </main>

    <div id="ui-overlay" class="hidden">
        <div class="ui-aura"></div>
        <div class="ui-text">ULTRA INSTINCT ACTIVATED</div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
