<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Core ULTIMATE PRO v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #ff0080; --s: #7928ca; --c: #00dfd8;
            --bg: #ffffff; --card: #ffffff; --dark: #111111;
            --text: #000000; --gray: #888888;
            --grad: linear-gradient(135deg, var(--p) 0%, var(--s) 100%);
            --br: 32px; --shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text); overflow-x:hidden; }

        main { max-width: 480px; margin:0 auto; padding:20px 20px 140px; min-height: 100vh; }
        .hidden { display: none !important; }

        /* 1. Header con Avatar Dinámico */
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:15px 0 35px; }
        .avatar { width:45px; height:45px; border-radius:18px; background:var(--grad); display:flex; align-items:center; justify-content:center; color:white; font-weight:800; }

        /* 2. Buscador Dinámico */
        #search-box { margin-bottom: 20px; transition: 0.3s; }
        .z-input-s { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #eee; background: #fbfbfb; outline: none; }

        /* 3. Motivación Diaria */
        .m-card { background: var(--grad); border-radius: 30px; padding:25px; color:white; margin-bottom:30px; position:relative; overflow:hidden; }
        .m-card i { position: absolute; right: -10px; top: -10px; font-size: 5rem; opacity: 0.1; }

        /* 4. Reto Fitness Aleatorio */
        .fit-card { background: #000; color: #fff; border-radius: 25px; padding: 20px; margin-bottom: 25px; border-left: 5px solid var(--c); }

        /* 5. Calendario de 21 días */
        .cal-container { overflow-x: auto; display: flex; gap: 12px; padding-bottom: 25px; scroll-behavior: smooth; }
        .cal-container::-webkit-scrollbar { display: none; }
        .cal-item { flex: 0 0 60px; display:flex; flex-direction:column; align-items:center; padding:15px 5px; border-radius:20px; border:1.5px solid #f0f0f0; }
        .cal-item.active { background: var(--dark); color:white; border-color: var(--dark); transform: scale(1.1); }

        /* 6. Gráficas de Productividad */
        .glass-card { background: white; border-radius: var(--br); padding:20px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; margin-bottom:25px; }
        .stats-grid { display:flex; justify-content:space-around; align-items:flex-end; height:80px; margin-top:15px; }
        .bar-outer { width:15px; height:80px; background:#f4f4f4; border-radius:10px; position:relative; overflow:hidden; }
        .bar-inner { position:absolute; bottom:0; width:100%; background:var(--grad); transition: 0.5s; }

        /* 7. Banco del Bebé / Gastos */
        .banco-hero { background: var(--dark); border-radius: 25px; padding: 25px; color: #fff; text-align: center; margin-bottom: 20px; }
        .banco-hero h2 { color: var(--c); font-size: 2rem; }

        /* UI Items */
        .task-item { display:flex; align-items:center; gap:15px; padding:18px; background:white; border-radius:24px; margin-bottom:12px; border:1px solid #f9f9f9; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .task-item.done { opacity: 0.5; text-decoration: line-through; }
        .task-check { width:24px; height:24px; border:2px solid #eee; border-radius:50%; }
        .task-item.done .task-check { background: var(--p); border:none; }

        /* Bottom Nav */
        .bottom-tabs { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:92%; max-width:400px; background:rgba(17,17,17,0.98); padding:10px; border-radius:40px; display:flex; justify-content:space-around; z-index:2000; }
        .tab-icon { color:#555; font-size:1.3rem; padding:12px; border-radius:50%; }
        .tab-icon.active { color:white; background:rgba(255,255,255,0.1); }

        .z-btn { background:var(--grad); color:white; border:none; padding:18px; border-radius:20px; width:100%; font-weight:800; cursor:pointer; margin-top:10px; }
        .z-input { width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:10px; font-family: inherit; }

        /* Editor */
        #rich-editor { min-height: 300px; padding: 10px; outline: none; line-height: 1.6; }
        .toolbar { display: flex; gap: 5px; background: #f0f0f0; padding: 8px; border-radius: 12px; margin-bottom: 10px; overflow-x: auto; }
        .toolbar button { padding: 5px 10px; border: none; background: #fff; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <main>
        <div id="v-inicio" class="view">
            <header class="app-header">
                <div class="user-pill">
                    <div class="avatar" id="avatar-init">M</div>
                    <div><p style="font-size:0.7rem; color:var(--gray);">Hola,</p><h1 id="user-name">Maycol</h1></div>
                </div>
                <div style="display:flex; gap:15px;">
                    <i class="fas fa-search" onclick="z.toggleSearch()"></i>
                    <i class="fas fa-bell" onclick="z.askPerms()" style="color:var(--p);"></i>
                </div>
            </header>

            <div id="search-box" class="hidden">
                <input type="text" class="z-input-s" placeholder="Buscar misiones..." oninput="z.renderTasks(this.value)">
            </div>

            <div class="m-card">
                <i class="fas fa-bolt"></i>
                <p id="quote-text" style="font-weight:700; font-style:italic;">"La disciplina es libertad."</p>
            </div>

            <div class="fit-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h4 style="font-size:0.7rem; letter-spacing:1px;">RETO FITNESS</h4>
                    <i class="fas fa-sync" onclick="z.genFit()"></i>
                </div>
                <p id="fit-text" style="font-weight:800; font-size:1.1rem; margin-top:5px;">Cargando reto...</p>
            </div>

            <div class="cal-container" id="cal-strip"></div>

            <div class="glass-card">
                <div style="display:flex; justify-content:space-between;">
                    <h4 style="font-size:0.7rem; color:var(--gray);">PRODUCTIVIDAD</h4>
                    <span id="pct-text" style="color:var(--p); font-weight:800; font-size:0.8rem;">0%</span>
                </div>
                <div class="stats-grid" id="stats-bars"></div>
            </div>

            <h2>Mi Agenda</h2>
            <div id="task-list"></div>
        </div>

        <div id="v-programar" class="view hidden">
            <h2>Programar Misión</h2>
            <div class="glass-card">
                <input type="text" id="t-name" class="z-input" placeholder="¿Qué hay que hacer?">
                <input type="datetime-local" id="t-time" class="z-input">
                <select id="t-cat" class="z-input">
                    <option value="Trabajo">💻 Trabajo / UCATEC</option>
                    <option value="Mercado">🛒 Mercado Tarija</option>
                    <option value="Parroquia">⛪ Parroquia</option>
                    <option value="Personal">👤 Personal</option>
                </select>
                <button class="z-btn" onclick="z.addTask()">Guardar en Agenda</button>
            </div>
        </div>

        <div id="v-banco" class="view hidden">
            <div class="banco-hero">
                <p style="font-size:0.7rem; opacity:0.7;">SALDO DISPONIBLE (Bs.)</p>
                <h2 id="total-bs">0.00</h2>
            </div>
            <div class="glass-card">
                <input type="text" id="g-desc" class="z-input" placeholder="Descripción">
                <input type="number" id="g-amt" class="z-input" placeholder="Monto Bs.">
                <div style="display:flex; gap:10px;">
                    <button class="z-btn" style="background:#00c853;" onclick="z.addCash('in')">Ingreso</button>
                    <button class="z-btn" style="background:#ff3d00;" onclick="z.addCash('out')">Gasto</button>
                </div>
            </div>
            <div id="cash-list"></div>
        </div>

        <div id="v-notas" class="view hidden">
            <h2>Notas Z-Core</h2>
            <div class="toolbar">
                <button onclick="z.exec('bold')">B</button>
                <button onclick="z.exec('italic')">I</button>
                <button onclick="z.exec('insertUnorderedList')">Bullet</button>
                <button onclick="z.saveNote()" style="background:var(--p); color:white;">Guardar</button>
            </div>
            <div class="glass-card">
                <div id="rich-editor" contenteditable="true" placeholder="Escribe aquí tus apuntes de UCATEC..."></div>
            </div>
            <div id="notes-archive"></div>
        </div>

        <div id="v-ajustes" class="view hidden">
            <h2>Configuración</h2>
            <div class="glass-card">
                <p style="font-weight:800; font-size:0.8rem; margin-bottom:10px;">NOMBRE DE USUARIO</p>
                <input type="text" id="user-set" class="z-input" placeholder="Escribe tu nombre..." oninput="z.setU()">
            </div>
            <div class="glass-card" style="text-align:center;">
                <button class="z-btn" style="background:#333;" onclick="z.export()">Descargar Backup</button>
                <button class="z-btn" style="background:#ff4757; margin-top:20px;" onclick="z.wipe()">BORRAR TODO</button>
            </div>
        </div>

    </main>

    <nav class="bottom-tabs">
        <div class="tab-icon active" onclick="z.nav('inicio', this)"><i class="fas fa-home"></i></div>
        <div class="tab-icon" onclick="z.nav('programar', this)"><i class="fas fa-calendar-plus"></i></div>
        <div class="tab-icon" onclick="z.nav('banco', this)"><i class="fas fa-wallet"></i></div>
        <div class="tab-icon" onclick="z.nav('notas', this)"><i class="fas fa-edit"></i></div>
        <div class="tab-icon" onclick="z.nav('ajustes', this)"><i class="fas fa-cog"></i></div>
    </nav>

    <script>
        const z = {
            db: { user: "Maycol", tasks: [], cash: [], notes: [], selD: new Date().toISOString().split('T')[0] },
            quotes: ["Haz de cada día tu obra maestra.", "La disciplina vence al talento.", "Cree en ti mismo.", "El éxito es la suma de pequeños esfuerzos."],
            fitness: ["10 Sentadillas rápidas", "Subir 3 pisos por escaleras", "Tomar 500ml de agua", "Estiramiento de 2 min", "Caminar 5 min intensos"],
            
            init() {
                const saved = localStorage.getItem('z_core_pro_v2');
                if(saved) this.db = JSON.parse(saved);
                this.render(); this.genFit(); this.autoCap();
                setInterval(() => this.checkNotify(), 60000);
            },
            save() { localStorage.setItem('z_core_pro_v2', JSON.stringify(this.db)); this.render(); },
            nav(id, el) {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.querySelectorAll('.tab-icon').forEach(t => t.classList.remove('active'));
                document.getElementById('v-'+id).classList.remove('hidden');
                el.classList.add('active');
            },
            // 1. TAREAS
            addTask() {
                const n = document.getElementById('t-name').value;
                const t = document.getElementById('t-time').value;
                if(!n || !t) return;
                this.db.tasks.push({ id: Date.now(), name: n, time: t, cat: document.getElementById('t-cat').value, done: false });
                document.getElementById('t-name').value = "";
                this.save(); this.nav('inicio', document.querySelector('.tab-icon'));
            },
            toggleT(id) { const t = this.db.tasks.find(x => x.id === id); t.done = !t.done; this.save(); },
            delT(id) { if(confirm("¿Eliminar?")) { this.db.tasks = this.db.tasks.filter(x => x.id !== id); this.save(); } },
            
            // 2. BANCO
            addCash(type) {
                const d = document.getElementById('g-desc').value;
                const a = parseFloat(document.getElementById('g-amt').value);
                if(!d || !a) return;
                this.db.cash.unshift({ d, a, type, date: new Date().toLocaleString() });
                document.getElementById('g-desc').value = ""; document.getElementById('g-amt').value = "";
                this.save();
            },

            // 3. RENDERIZADO COMPLETO
            render() {
                // Nombre y Avatar
                document.getElementById('user-name').innerText = this.db.user;
                document.getElementById('avatar-init').innerText = this.db.user.charAt(0).toUpperCase();
                
                // Calendario de 21 días (Punto 5)
                const strip = document.getElementById('cal-strip'); strip.innerHTML = "";
                for(let i=-7; i<=14; i++){
                    const d = new Date(); d.setDate(d.getDate()+i);
                    const ds = d.toISOString().split('T')[0];
                    strip.innerHTML += `<div class="cal-item ${ds===this.db.selD?'active':''}" onclick="z.db.selD='${ds}';z.save()">
                        <span style="font-size:0.6rem;">${d.toLocaleDateString('es',{weekday:'short'}).toUpperCase()}</span>
                        <b style="font-size:1.1rem;">${d.getDate()}</b>
                    </div>`;
                }

                // Agenda filtrada
                const list = this.db.tasks.filter(t => t.time.startsWith(this.db.selD));
                document.getElementById('task-list').innerHTML = list.map(t => `
                    <div class="task-item ${t.done?'done':''}" onclick="z.toggleT(${t.id})">
                        <div class="task-check"></div>
                        <div style="flex:1">
                            <p style="font-size:0.6rem; color:var(--p); font-weight:800;">${t.time.split('T')[1]} • ${t.cat}</p>
                            <h4 style="font-size:0.9rem;">${t.name}</h4>
                        </div>
                        <i class="fas fa-trash" style="color:#eee" onclick="event.stopPropagation();z.delT(${t.id})"></i>
                    </div>
                `).join('') || '<p style="text-align:center; color:#ccc; padding:20px;">No hay misiones hoy</p>';

                // Banco y Saldo
                let total = 0;
                document.getElementById('cash-list').innerHTML = this.db.cash.map(c => {
                    total += (c.type === 'in' ? c.a : -c.a);
                    return `<div class="task-item"><span>${c.d}</span><b style="margin-left:auto; color:${c.type==='in'?'#00c853':'#ff3d00'}">${c.a} Bs.</b></div>`;
                }).join('');
                document.getElementById('total-bs').innerText = total.toFixed(2);

                // Notas
                document.getElementById('notes-archive').innerHTML = this.db.notes.map((n, i) => `
                    <div class="glass-card"><small>${n.date}</small><div>${n.body}</div></div>
                `).join('');

                // Gráficas (Punto 6)
                this.renderStats();
            },

            renderStats() {
                const container = document.getElementById('stats-bars'); container.innerHTML = "";
                const days = ['L','M','M','J','V','S','D'];
                days.forEach((day, i) => {
                    const h = Math.floor(Math.random() * 80) + 10; // Simulación por ahora
                    container.innerHTML += `<div style="text-align:center">
                        <div class="bar-outer"><div class="bar-inner" style="height:${h}%"></div></div>
                        <span style="font-size:0.6rem; color:var(--gray);">${day}</span>
                    </div>`;
                });
            },

            // UTILIDADES
            genFit() { document.getElementById('fit-text').innerText = this.fitness[Math.floor(Math.random()*this.fitness.length)]; },
            toggleSearch() { document.getElementById('search-box').classList.toggle('hidden'); },
            setU() { this.db.user = document.getElementById('user-set').value || "Maycol"; this.save(); },
            exec(c) { document.execCommand(c); },
            saveNote() {
                const body = document.getElementById('rich-editor').innerHTML;
                if(!body) return;
                this.db.notes.unshift({ body, date: new Date().toLocaleString() });
                document.getElementById('rich-editor').innerHTML = "";
                this.save();
            },
            autoCap() {
                document.addEventListener('input', e => {
                    if(e.target.tagName === 'INPUT' && e.target.value.length === 1) {
                        e.target.value = e.target.value.toUpperCase();
                    }
                });
            },
            askPerms() { if(Notification.permission !== 'granted') Notification.requestPermission(); },
            checkNotify() {
                const now = new Date().toISOString().substring(0, 16);
                this.db.tasks.forEach(t => {
                    if(t.time === now && !t.done) new Notification("Z-CORE", { body: "Misión: " + t.name });
                });
            },
            export() {
                const b = new Blob([JSON.stringify(this.db)], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'zcore_backup.json'; a.click();
            },
            wipe() { if(confirm("¿BORRAR TODO?")) { localStorage.clear(); location.reload(); } }
        };
        z.init();
    </script>
</body>
</html>
