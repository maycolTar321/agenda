<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Optimizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f85b7f">
    <link rel="icon" type="image/png" href="android-assets/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="user-info">
            <p id="greeting-text">Buenos Días,</p>
            <h1 id="user-name">Maycol</h1>
        </div>
        <div class="profile-circle">
            <img src="android-assets/icon-192.png" alt="Profile" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </header>

    <main>
        <!-- Page 1: Dashboard -->
        <div id="page-dashboard" class="tab-content">
            <div class="date-strip" id="days-strip"></div>
            
            <h3 class="section-title">Schedule Today</h3>
            <div id="today-tasks-container">
                <!-- Tasks for today will go here -->
            </div>

            <h3 class="section-title">Reminders</h3>
            <div id="reminders-container">
                <!-- Reminders/Water will go here -->
            </div>
        </div>

        <!-- Page 2: Add Task -->
        <div id="page-missions" class="tab-content hidden">
            <h2 class="section-title">Set Schedule</h2>
            <div class="card-form">
                <div class="input-group">
                    <label>Task Name</label>
                    <input type="text" id="mission-input" placeholder="What needs to be done?">
                </div>
                <div class="input-group">
                    <label>Select Date & Time</label>
                    <input type="datetime-local" id="mission-time">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="mission-priority">
                        <option value="S">Urgent (Pink)</option>
                        <option value="A">Important (Purple)</option>
                        <option value="B">Normal (Cyan)</option>
                    </select>
                </div>
                <button id="add-mission" class="btn-main">Save Schedule</button>
            </div>
            
            <h3 class="section-title" style="margin-top: 30px;">All Tasks</h3>
            <ul id="missions-list" class="task-list-modern"></ul>
        </div>

        <!-- Page 3: Training/Hydration -->
        <div id="page-training" class="tab-content hidden">
            <h2 class="section-title">Wellness</h2>
            <div class="card glass">
                <h3>Hydration Tracker</h3>
                <div id="water-bottles" style="display:flex; gap:10px; margin: 15px 0; justify-content: center;"></div>
            </div>
            
            <h3 class="section-title">Quick Challenges</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-main" onclick="zCore.triggerOfficeChallenge('stairs', 'Stairs')">Stairs</button>
                <button class="btn-main" onclick="zCore.triggerOfficeChallenge('stretch', 'Stretch')">Stretch</button>
            </div>
        </div>

        <!-- Page 4: Notes -->
        <div id="page-notes" class="tab-content hidden">
            <h2 class="section-title">Notes</h2>
            <textarea id="notes-area" style="height: 400px; border-radius: 25px;" placeholder="Write your thoughts..."></textarea>
        </div>

        <!-- Page 5: Supplies -->
        <div id="page-supplies" class="tab-content hidden">
            <h2 class="section-title">Supplies</h2>
            <div class="input-group" style="display:flex; gap:10px;">
                <input type="text" id="supply-input" placeholder="Add item...">
                <button id="add-supply" class="btn-main" style="width: 60px;">+</button>
            </div>
            <ul id="supplies-list"></ul>
        </div>

        <!-- Page 6: Settings & Backup -->
        <div id="page-settings" class="tab-content hidden">
            <h2 class="section-title">Database & Backup</h2>
            <div class="card glass" style="padding: 20px; text-align: center;">
                <p style="margin-bottom: 20px; color: var(--text-light);">Guarda una copia de seguridad de todos tus datos para no perderlos nunca.</p>
                
                <button class="btn-main" onclick="zCore.exportData()" style="background: #00b894; margin-bottom: 15px;">
                    <i class="fas fa-download"></i> Exportar Datos (Backup)
                </button>
                
                <div style="margin-top: 10px;">
                    <label for="import-file" class="btn-main" style="background: #0984e3; cursor:pointer; display: inline-block;">
                        <i class="fas fa-upload"></i> Importar Datos (Restore)
                    </label>
                    <input type="file" id="import-file" style="display:none" onchange="zCore.importData(event)">
                </div>
                
                <button class="btn-main" onclick="zCore.clearAllData()" style="background: #d63031; margin-top: 30px; font-size: 0.8rem; padding: 10px;">
                    BORRAR TODO EL SISTEMA
                </button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="zCore.switchPage('dashboard', this)">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="zCore.switchPage('missions', this)">
            <i class="fas fa-calendar-plus"></i>
            <span>Add</span>
        </button>
        <button class="nav-item" onclick="zCore.switchPage('notes', this)">
            <i class="fas fa-sticky-note"></i>
            <span>Notes</span>
        </button>
        <button class="nav-item" onclick="zCore.switchPage('supplies', this)">
            <i class="fas fa-shopping-bag"></i>
            <span>Items</span>
        </button>
        <button class="nav-item" onclick="zCore.switchPage('settings', this)">
            <i class="fas fa-database"></i>
            <span>Backup</span>
        </button>
    </nav>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
